# Proxy Providers
proxy-providers:
  FlowerCloud:
    type: http
    url: ""
    path: "./Proxy_Providers/FlowerCloud.yaml"
    proxy: DIRECT
    interval: 0
    size-limit: 0
    exclude-filter: "Traffic|Expire"
    override:
      tfo: true
      udp: true
    health-check:
      enable: true
      url: "https://cp.cloudflare.com/generate_204"
      interval: 600
      timeout: 5000
      lazy: true

# Proxy Groups
  # Templates
Auto: &Auto
  type: url-test
  url: "https://cp.cloudflare.com/generate_204"
  interval: 600
  timeout: 5000
  lazy: true
  tolerrance: 20
  include-all: true

Fallback: &Fallback
  type: fallback
  url: "https://cp.cloudflare.com/generate_204"
  interval: 600
  timeout: 5000
  lazy: true
  tolerrance: 20
  include-all: true

proxy-groups:
  # Services Groups
  - name: DEFAULT
    type: select
    proxies:
      - FlowerCloud | 日本标准
      - FlowerCloud | 日本高级
      - FlowerCloud | 香港标准
      - FlowerCloud | 香港高级
      - PROXY

  - name: YouTube
    type: select
    proxies:
      - FlowerCloud | 美国标准
      - FlowerCloud | 美国高级
      - FlowerCloud | 日本标准
      - FlowerCloud | 日本高级
      - FlowerCloud | 香港标准
      - FlowerCloud | 香港高级
      - PROXY

  - name: Netflix
    type: select
    filter: "香港|新加坡"
    include-all: true

  - name: Disney+
    type: select
    filter: "香港|新加坡"
    include-all: true

  - name: Spotify
    type: select
    proxies:
      - FlowerCloud | 台湾标准
      - FlowerCloud | 台湾高级
      - PROXY

  - name: PayPal
    type: select
    proxies:
      - FlowerCloud | 台湾标准
      - FlowerCloud | 台湾高级
      - PROXY

  - name: GoogleVoice
    type: select
    proxies:
      - FlowerCloud | 美国标准
      - FlowerCloud | 美国高级
      - PROXY

  - name: Google
    type: select
    proxies:
      - DEFAULT
      - PROXY

  - name: Steam
    type: select
    proxies:
      - DEFAULT
      - PROXY
      - DIRECT

  - name: Epic
    type: select
    proxies:
      - DIRECT
      - DEFAULT
      - PROXY

  - name: TestFlight
    type: select
    proxies:
      - DIRECT
      - DEFAULT
      - PROXY

  - name: Blizzard
    type: select
    proxies:
      - FlowerCloud | 香港标准
      - FlowerCloud | 香港高级
      - FlowerCloud | 台湾标准
      - FlowerCloud | 台湾高级
      - FlowerCloud | 日本标准
      - FlowerCloud | 日本高级
      - PROXY

  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - DEFAULT
      - PROXY

  - name: AppleOS_Update
    type: select
    proxies:
      - DIRECT
      - REJECT
      - DEFAULT
      - PROXY

  - name: Speedtest
    type: select
    proxies:
      - DIRECT
      - PROXY

  # Node Groups
  - name: FlowerCloud | 日本标准
    <<: *Auto
    filter: "日本标准"

  - name: FlowerCloud | 日本高级
    <<: *Auto
    filter: "日本高级"

  - name: FlowerCloud | 香港标准
    <<: *Auto
    filter: "香港标准"

  - name: FlowerCloud | 香港高级
    <<: *Auto
    filter: "香港高级"

  - name: FlowerCloud | 美国标准
    <<: *Auto
    filter: "美国标准"

  - name: FlowerCloud | 美国高级
    <<: *Auto
    filter: "美国高级"

  - name: FlowerCloud | 台湾标准
    <<: *Auto
    filter: "台湾标准"

  - name: FlowerCloud | 台湾高级
    <<: *Auto
    filter: "台湾高级"

  - name: PROXY
    <<: *Auto
    include-all: true

