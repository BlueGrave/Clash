# ══ 端口 ══════════════════════════════════════════════════════
# HTTP + SOCKS5 混合端口（推荐只用这一个）
mixed-port: 7890

# 是否允许局域网内其他设备接入代理
# 个人电脑设 false；软路由/共享代理设 true
allow-lan: true

# allow-lan 为 true 时绑定哪些网卡，* 表示全部
bind-address: "*"

# ══ 运行模式 ══════════════════════════════════════════════════
# 规则模式：Rule（规则） / Global（全局代理）/ Direct（全局直连）
mode: Rule

# ══ 日志 ══════════════════════════════════════════════════════
# 5 个级别：silent / error / warning / info / debug。级别越高日志输出量越大，越倾向于调试，若需要请自行开启。
# 日常用 warning；排查问题时改 debug
log-level: warning

# ══ 杂项 ══════════════════════════════════════════════════════
# 不建议新手开启，避免意外问题
ipv6: false

# 是否匹配进程名（路由器/软路由推荐 off）
find-process-mode: strict

# 统一延迟测试：用实际往返时间，更准确
unified-delay: true

# TCP 并发：同时向所有解析 IP 发起连接，选最快的
tcp-concurrent: true

# 全局 TLS 指纹伪装
global-client-fingerprint: chrome

# ══ 外部控制（Web 面板）══════════════════════════════════════
external-controller: 127.0.0.1:9090

# 如果对外暴露务必设置密码
# secret: "your_strong_password"

# Web UI 存放目录（相对于配置文件目录）
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# ══ GeoData 数据库地址 ════════════════════════════════════════
geox-url:
  geoip:   "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb:    "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

# ══ 配置持久化 ════════════════════════════════════════════════
profile:
  # 记住你在 Web UI 中的节点选择，重启后不丢失
  store-selected: true
  # 持久化 fake-ip 映射表
  store-fake-ip: true
  # Clash 的 RESTful API
external-controller: '127.0.0.1:9090'

dns:
  # 是否启用 dns false
  enable: true
  listen: 127.0.0.1:53
  # 当此选项为 false 时, AAAA 请求将返回空
  ipv6: false
  # 优先使用 HTTP/3 协议（DoH3），更快
  prefer-h3: true
  # 推荐模式，速度快，与规则配合最好
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # fake-ip 白名单：这些域名不返回假 IP，直接正常解析
  # 主要是局域网服务、NTP、游戏 STUN 等不适合 fake-ip 的场景
  fake-ip-filter:
    - '*.lan'
    - cable.auth.com
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - network-test.debian.org
    - detectportal.firefox.com
    - resolver1.opendns.com
    - '*.*.*.srv.nintendo.net'
    - '*.*.stun.playstation.net'
    - xbox.*.*.microsoft.com
    - '*.*.xboxlive.com'
    - stun.*.*.*
    - stun.*.*
    - localhost.*.qq.com
    - '*.logon.battlenet.com.cn'
    - '*.logon.battle.net'
    - '*.blzstatic.cn'
    - music.163.com
    - '*.music.163.com'
    - '*.126.net'
    - musicapi.taihe.com
    - music.taihe.com
    - songsearch.kugou.com
    - trackercdn.kugou.com
    - '*.kuwo.cn'
    - api-jooxtt.sanook.com
    - api.joox.com
    - joox.com
    - y.qq.com
    - '*.y.qq.com'
    - streamoc.music.tc.qq.com
    - mobileoc.music.tc.qq.com
    - isure.stream.qqmusic.qq.com
    - dl.stream.qqmusic.qq.com
    - aqqmusic.tc.qq.com
    - amobile.music.tc.qq.com
    - '*.xiami.com'
    - '*.music.migu.cn'
    - music.migu.cn
    - proxy.golang.org
    - '*.mcdn.bilivideo.cn'
    - '*.cmpassport.com'
    - id6.me
    - open.e.189.cn
    - mdn.open.wo.cn
    - auth.wosms.cn
    - '*.jegotrip.com.cn'
    - '*.icitymobile.mobi'
    - '*.pingan.com.cn'
    - '*.cmbchina.com'
    - pool.ntp.org
    - '*.pool.ntp.org'
    - ntp.*.com
    - time.*.com
    - ntp?.*.com
    - time?.*.com
    - time.*.gov
    - time.*.edu.cn
    - '*.ntp.org.cn'
    - PDC._msDCS.*.*
    - DC._msDCS.*.*
    - GC._msDCS.*.*
    - speedtest.cros.wr.pvp.net
    - '*.teafone.com'
    - '*.sktswe.net'
    - rtc.goodfone.co.kr
    - '*.chattti.com'
    - '+.push.apple.com'

  # DNS 解析遵循路由规则（如需国外域名走代理 DNS，开启此项）
  respect-rules: true

  # 解析代理节点域名用的 DNS（避免代理节点域名本身被污染）
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  # 指定特定域名走特定 DNS（优先级最高）
  nameserver-policy:
    '*.tmall.com': 223.5.5.5
    '*.taobao.com': 223.5.5.5
    '*.alicdn.com': 223.5.5.5
    '*.aliyun.com': 223.5.5.5
    '*.alipay*.com': 223.5.5.5
    '*.alibaba*.com': 223.5.5.5
    '*.alimama*.com': 223.5.5.5
    '*.qq.com': 119.29.29.29
    '*.tencent.com': 119.29.29.29
    '*.weixin.com': 119.29.29.29
    dns.alidns.com: quic://223.5.5.5:853
    dot.pub: 119.29.29.29
    doh.pub: 119.29.29.29
    dns.pub: 119.29.29.29
    doh.360.cn: 101.198.198.198
    # 国内主要厂商用自家 DNS，解析结果最准确
    'geosite:cn,private':
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    # 国外域名走加密 DNS（配合 respect-rules 会走代理）
    'geosite:geolocation-!cn':
      - 'tls://8.8.8.8'
      - 'tls://1.1.1.1'
    hosts:
      dns.alidns.com:
        - 223.5.5.5
        - 223.6.6.6
        - 2400:3200:baba::1
        - 2400:3200::1
      127.0.0.1.sslip.io: 127.0.0.1
      127.atlas.skk.moe: 127.0.0.1
      cdn.jsdelivr.net: cdn.jsdelivr.net.cdn.cloudflare.net
  # 默认 nameserver：国内 DNS（nameserver-policy 未覆盖的域名使用这里），并发查询取最快结果
  nameserver:
    - https://dns.alidns.com/dns-query # Ali DoH
    - https://doh.pub/dns-query # Tencent DoH
