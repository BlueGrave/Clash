  # 解析代理节点域名用的 DNS（避免代理节点域名本身被污染），如果不填则遵循 nameserver-policy、nameserver 和 fallback 的配置
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  # 指定特定域名走特定 DNS（优先级最高），可使用 geosite, 优先于 nameserver/fallback 查询
